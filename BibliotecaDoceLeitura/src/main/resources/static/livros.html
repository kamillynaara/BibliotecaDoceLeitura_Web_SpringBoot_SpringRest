<!DOCTYPE html>
<html lang="pt-br"><head>
<meta charset="UTF-8"><title>Livros</title>
<link rel="stylesheet" href="assets/css/style.css"></head>
<body>
  <header><h2>Livros</h2></header>
  <main>
    <form id="formLivro">
      <label>Título <input required id="titulo"></label>
      <label>Autor <input required id="autor"></label>
      <label>Gênero <input required id="genero"></label>
      <label>Ano <input required pattern="\d{4}" id="ano"></label>
      <label>Descrição <textarea id="descricao"></textarea></label>
      <button type="submit">Cadastrar</button>
    </form>
    <section>
      <h3>Lista</h3>
      <ul id="listaLivros"></ul>
    </section>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
