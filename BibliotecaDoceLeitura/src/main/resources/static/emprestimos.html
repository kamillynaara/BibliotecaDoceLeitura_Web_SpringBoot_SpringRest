<!DOCTYPE html>
<html lang="pt-br"><head>
<meta charset="UTF-8"><title>Empréstimos</title>
<link rel="stylesheet" href="assets/css/style.css"></head>
<body>
  <header><h2>Empréstimos</h2></header>
  <main>
    <form id="formEmprestimo">
      <label>ID Cliente <input required pattern="\d+" id="idCliente"></label>
      <label>ID Livro <input required pattern="\d+" id="idLivro"></label>
      <label>Prevista (YYYY-MM-DD) <input required pattern="\d{4}-\d{2}-\d{2}" id="prevista"></label>
      <button type="submit">Registrar</button>
    </form>
    <section>
      <h3>Ativos</h3>
      <ul id="listaEmprestimos"></ul>
    </section>
  </main>
  <script src="assets/js/app.js"></script>
</body>
</html>
