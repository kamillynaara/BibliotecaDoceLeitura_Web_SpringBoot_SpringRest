# === Datasource (ajuste usuario/senha) ===
spring.datasource.url=jdbc:mysql://localhost:3306/BibliotecaDoceLeitura?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# === JPA/Hibernate ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# O banco será criado/populado pelo script SQL externo.
# Evita executar automaticamente data.sql do classpath.
spring.sql.init.mode=never

# === Web ===
server.port=8080